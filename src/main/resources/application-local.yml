spring:
  datasource:
    url: jdbc:h2:mem:subSave;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      validation-timeout: 2000
      leak-detection-threshold: 20000

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always


mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: subsave

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration-millis: 3600000

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: http://localhost:3000/oauth/kakao/callback
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    secret: ${KAKAO_CLIENT_SECRET}

  naver:
    client-id: ${NAVER_CLIENT_ID}
    redirect-uri: http://localhost:3000/oauth/naver/callback
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    client-secret: ${NAVER_CLIENT_SECRET}

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    redirect-uri: http://localhost:3000/oauth/google/callback
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
    client-secret: ${GOOGLE_CLIENT_SECRET}

geoip:
  ip-api:
    base-url: http://ip-api.com

payment:
  provider: stub
  stub:
    delay-ms: 120
    fail-rate: 0.0

server:
  tomcat:
    threads:
      max: 200
    accept-count: 500