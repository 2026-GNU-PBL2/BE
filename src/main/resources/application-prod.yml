spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration-millis: 3600000

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    secret: ${KAKAO_CLIENT_SECRET}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    redirect-uri: ${NAVER_REDIRECT_URI}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    client-secret: ${NAVER_CLIENT_SECRET}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
    client-secret: ${GOOGLE_CLIENT_SECRET}

kftc:
  client-id: ${KFTC_CLIENT_ID}
  client-secret: ${KFTC_CLIENT_SECRET}
  redirect-url: ${KFTC_REDIRECT_URL}
  use-org-code: ${KFTC_USE_ORG_CODE}
  base-url: ${KFTC_BASE_URL:https://testapi.openbanking.or.kr}

toss:
  secret-key: ${TOSS_SECRET_KEY}
  base-url: https://api.tosspayments.com