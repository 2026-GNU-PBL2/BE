spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  application:
    name: subSave
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration-millis: 3600000

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: http://localhost:3000/oauth/kakao/callback
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    secret: ${KAKAO_CLIENT_SECRET}

  naver:
    client-id: ${NAVER_CLIENT_ID}
    redirect-uri: http://localhost:3000/oauth/naver/callback
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    client-secret: ${NAVER_CLIENT_SECRET}

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    redirect-uri: http://localhost:3000/oauth/google/callback
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
    client-secret: ${GOOGLE_CLIENT_SECRET}

kftc:
  client-id: ${KFTC_CLIENT_ID}
  client-secret: ${KFTC_CLIENT_SECRET}
  redirect-url: ${KFTC_REDIRECT_URL}
  use-org-code: ${KFTC_USE_ORG_CODE}
  base-url: ${KFTC_BASE_URL:https://testapi.openbanking.or.kr}
