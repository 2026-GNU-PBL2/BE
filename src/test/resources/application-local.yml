spring:
  datasource:
    url: jdbc:h2:mem:subSave;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

jwt:
  secret-key: ${JWT_SECRET_KEY:test-secret-key-for-unit-tests-only-32ch}

crypto:
  aes-secret-key: ${CRYPTO_AES_SECRET_KEY:test-aes-secret-key-32bytes-here}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:test-kakao-client-id}
    redirect-uri: http://localhost:3000/oauth/kakao/callback
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    secret: ${KAKAO_CLIENT_SECRET:test-kakao-secret}

  naver:
    client-id: ${NAVER_CLIENT_ID:test-naver-client-id}
    redirect-uri: http://localhost:3000/oauth/naver/callback
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    client-secret: ${NAVER_CLIENT_SECRET:test-naver-secret}

  google:
    client-id: ${GOOGLE_CLIENT_ID:test-google-client-id}
    redirect-uri: http://localhost:3000/oauth/google/callback
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
    client-secret: ${GOOGLE_CLIENT_SECRET:test-google-secret}

kftc:
  client-id: ${KFTC_CLIENT_ID:test-kftc-client-id}
  client-secret: ${KFTC_CLIENT_SECRET:test-kftc-client-secret}
  redirect-url: ${KFTC_REDIRECT_URL:http://localhost:3000/kftc/callback}
  use-org-code: ${KFTC_USE_ORG_CODE:test-org-code}
  base-url: ${KFTC_BASE_URL:https://testapi.openbanking.or.kr}

toss:
  secret-key: ${TOSS_SECRET_KEY:test-toss-secret-key}
  base-url: https://api.tosspayments.com

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:test-bucket}
    region: ${AWS_S3_REGION:ap-northeast-2}
    access-key: ${AWS_S3_ACCESS_KEY:test-access-key}
    secret-key: ${AWS_S3_SECRET_KEY:test-secret-key}
    cdn-base-url: ${AWS_S3_CDN_BASE_URL:}

solapi:
  api-key: ${SOLAPI_API_KEY:test-solapi-key}
  api-secret: ${SOLAPI_API_SECRET:test-solapi-secret}
  sender-number: ${SOLAPI_SENDER_NUMBER:01000000000}
  enabled: ${SOLAPI_ENABLED:false}
